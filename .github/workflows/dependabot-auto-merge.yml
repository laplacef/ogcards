name: dependabot-auto-merge

# Enables native auto-merge for patch and minor Dependabot PRs; `--auto` waits
# on required status checks, so a bump that breaks CI never lands. Triggers on
# `pull_request`, not `pull_request_target`, and never checks out PR code, so
# no elevated token or secret is exposed.
on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0

      # For grouped PRs, update-type reflects the highest bump in the group, so
      # a group containing a major resolves to semver-major and is left manual.
      - name: Enable auto-merge for patch and minor updates
        if: >-
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
